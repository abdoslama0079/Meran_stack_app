apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mern-prod
  labels:
    role: frontend
    env: demo
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 25%
  selector:
    matchLabels:
      role: frontend
  template:
    metadata:
      labels:
        role: frontend
    spec:
      containers:
        - name: frontend
          # Update this to your FRONTEND image name in ACR
          image: meranstackpro7721.azurecr.io/mern-app:7
          imagePullPolicy: Always
          env:
            - name: REACT_APP_BACKEND_URL
              value: "/api"
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: mern-prod
spec:
  type: ClusterIP
  selector:
    role: frontend
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
