apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: mern-kv-provider
  namespace: mern-prod
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useWorkloadIdentity: "true"
    keyvaultName: "akskv003883223"
    tenantId: "00000000-0000-0000-0000-000000000000" # Replace with tenant ID
    objects: |
      array:
        - |
          objectName: mongo-username # Name of the secret in Azure KV
          objectType: secret
          objectAlias: username      # Name it will have inside K8s
        - |
          objectName: mongo-password 
          objectType: secret
          objectAlias: password
  secretObjects:
    - secretName: mongo-sec
      type: Opaque
      data:
        - objectName: username
          key: username
        - objectName: password
          key: password